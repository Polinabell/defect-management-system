version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: defect_management_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  celery-worker:
    build: .
    container_name: defect_management_celery_worker
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
      - media_data:/app/media
      - backup_data:/app/backups
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - db
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: defect_management_celery_beat
    command: celery -A config beat --loglevel=info --scheduler=django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
      - media_data:/app/media
      - backup_data:/app/backups
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - db
    restart: unless-stopped

  celery-flower:
    build: .
    container_name: defect_management_celery_flower
    command: celery -A config flower --port=5555
    ports:
      - "5555:5555"
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: defect_management_db
    environment:
      POSTGRES_DB: defect_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  media_data:
  backup_data:
